<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Partners</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

header {
    padding: 40px 20px;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    color: #6d737a;
}

.logo-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 30px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

.logo-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
    transition: transform 0.3s ease;
}

/* Hover animation (NO GLOW) */
.logo-card:hover {
    transform: translateY(-8px) scale(1.05);
}

.logo-card img {
    max-height: 80px;
    max-width: 100%;
    object-fit: contain;
    transition: transform 0.3s ease;
}

.logo-card:hover img {
    transform: scale(1.08);
}

/* Footer */
footer {
    padding: 20px;
    font-size: 14px;
    color: #94a3b8;
    background: #0b1220;
    border-top: 1px solid #1e293b;
}
</style>
</head>

<body>

<header>
    <h1>Our Valued Clients</h1>
    <p>Empowering businesses with our advanced Dynamic Payment Reminder System.</p>
</header>

<div class="logo-container">

    <div class="logo-card">
        <img src="Kuya Big'z.png" alt="Logo 1">
    </div>

    <div class="logo-card">
        <img src="Anthony Monloy.png" alt="Logo 2">
    </div>

    <div class="logo-card">
        <img src="Daniel Quirido.png" alt="Logo 3">
    </div>

    <div class="logo-card">
        <img src="Senobga Xenohd.png" alt="Logo 4">
    </div>

    <div class="logo-card">
        <img src="Jon Skytech.png" alt="Logo 5">
    </div>

    <div class="logo-card">
        <img src="Del Valle.png" alt="Logo 6">
    </div>

</div>

<footer>
    © 2026 MTECHFIBER | Secure Access Portal
</footer>

</body>
</html>
